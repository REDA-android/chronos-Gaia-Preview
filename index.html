<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#04110c" />
    <title>Lumina Gemma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700;800&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              headline: ["Manrope", "sans-serif"],
              body: ["Inter", "sans-serif"],
              label: ["Space Grotesk", "sans-serif"]
            },
            colors: {
              "primary": "#c0fe71",
              "primary-fixed": "#c0fe71",
              "on-primary-fixed": "#2e4d00",
              "inverse-surface": "#edfdf4",
              "surface-variant": "#162a22",
              "secondary-container": "#2b4e3d",
              "inverse-primary": "#416a00",
              "surface-bright": "#1b3028",
              "primary-dim": "#b2ef64",
              "secondary-fixed": "#c5ebd4",
              "on-primary-fixed-variant": "#436c00",
              "error": "#ff716c",
              "on-tertiary": "#006834",
              "on-error": "#490006",
              "on-surface": "#edfdf4",
              "surface-container": "#0c1d16",
              "tertiary-fixed": "#6bfe9c",
              "outline": "#6a7971",
              "on-tertiary-container": "#005f2f",
              "surface-dim": "#04110c",
              "surface-container-low": "#071611",
              "on-primary-container": "#152800",
              "secondary-dim": "#b7ddc7",
              "on-secondary-container": "#b3d9c2",
              "primary-container": "#78b02c",
              "secondary": "#c5ebd4",
              "outline-variant": "#3d4b44",
              "tertiary": "#c3ffcd",
              "secondary-fixed-dim": "#b7ddc7",
              "on-surface-variant": "#9fafa6",
              "on-background": "#edfdf4",
              "background": "#04110c",
              "on-secondary": "#365947",
              "tertiary-container": "#6bfe9c",
              "surface": "#04110c",
              "primary-fixed-dim": "#b2ef64",
              "surface-container-high": "#11231c",
              "tertiary-dim": "#5bef90",
              "surface-tint": "#c0fe71",
              "on-secondary-fixed-variant": "#406351",
              "surface-container-highest": "#162a22",
              "inverse-on-surface": "#4a5851",
              "error-dim": "#d7383b",
              "tertiary-fixed-dim": "#5bef90",
              "on-primary": "#3b6100",
              "on-secondary-fixed": "#244635",
              "surface-container-lowest": "#000000",
              "error-container": "#9f0519",

              "on-tertiary-fixed-variant": "#006a35",

          }
        }
      }
    </script>
    <style>
      body {
        background-color: #04110c;
        color: #edfdf4;
        font-family: 'Inter', sans-serif;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #04110c; }
      ::-webkit-scrollbar-thumb { background: #162a22; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #c0fe71; }
      
      .glass-panel {
        background: rgba(12, 29, 22, 0.4);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        border: 1px solid rgba(192, 254, 113, 0.08);
      }
      .glass-edge-glow {
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1), 0 8px 32px 0 rgba(0, 0, 0, 0.8);
      }
      .bg-midnight-botanical {
        background-color: #081611;
        background-image: radial-gradient(circle at 0% 0%, rgba(157, 216, 80, 0.05) 0%, transparent 50%), radial-gradient(circle at 100% 100%, rgba(90, 218, 206, 0.05) 0%, transparent 50%);
      }
      .squishy-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 24px;
        height: 24px;
        background: #c0fe71;
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 0 15px rgba(192, 254, 113, 0.6);
        transition: transform 0.2s cubic-bezier(0.68, -0.6, 0.32, 1.6);
      }
      .squishy-slider:active::-webkit-slider-thumb {
        transform: scale(1.4);
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "@google/genai": "https://esm.sh/@google/genai@^1.36.0",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
      }
    }
    </script>
  </head>
  <body class="bg-midnight-botanical min-h-screen">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
