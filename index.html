<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#04110c" />
    <title>Lumina Gemma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700;800&family=Space+Grotesk:wght@300;400;500;700&family=Noto+Serif:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              headline: ["Noto Serif", "serif"],
              body: ["Space Grotesk", "sans-serif"],
              label: ["Space Grotesk", "sans-serif"],
              mono: ["Space Grotesk", "monospace"]
            },
            colors: {
              "primary": "#2ECC71",
              "primary-container": "#18A558",
              "secondary": "#A7FF00",
              "tertiary": "#004D40",
              "background": "#0A0F0D",
              "surface": "#0A0F0D",
              "surface-dim": "#050806",
              "surface-container-lowest": "#000000",
              "surface-container-low": "#0D1411",
              "surface-container": "#121A16",
              "surface-container-high": "#17211C",
              "surface-container-highest": "#1D2822",
              "surface-bright": "#233029",
              "on-surface": "#F0F5F2",
              "on-surface-variant": "#A0A8A4",
              "outline": "#5C6B64",
              "outline-variant": "#36423D",
              "error": "#FF6B6B",
              "on-error": "#4A0000",
              "error-container": "#930000",
              "on-error-container": "#FFB4B4",
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0A0F0D;
        color: #edfdf4;
        font-family: 'Manrope', sans-serif;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0b0f0b; }
      ::-webkit-scrollbar-thumb { background: #162a22; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #ddffaf; }
      
      .glass-panel {
        background: rgba(12, 29, 22, 0.4);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        border: 1px solid rgba(192, 254, 113, 0.08);
      }
      .glass-edge-glow {
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1), 0 8px 32px 0 rgba(0, 0, 0, 0.8);
      }
      .bg-midnight-botanical {
        background-color: #0b0f0b;
        background-image: radial-gradient(circle at 0% 0%, rgba(221, 255, 175, 0.05) 0%, transparent 50%), radial-gradient(circle at 100% 100%, rgba(162, 254, 0, 0.05) 0%, transparent 50%);
      }
      .squishy-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 24px;
        height: 24px;
        background: #ddffaf;
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 0 15px rgba(221, 255, 175, 0.6);
        transition: transform 0.2s cubic-bezier(0.68, -0.6, 0.32, 1.6);
      }
      .squishy-slider:active::-webkit-slider-thumb {
        transform: scale(1.4);
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "@google/genai": "https://esm.sh/@google/genai@^1.36.0",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
      }
    }
    </script>
  </head>
  <body class="bg-midnight-botanical min-h-screen">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
